name: Social Video Scheduler

on:
  workflow_dispatch:
    inputs:
      manual_video_url:
        description: 'Optional public HTTPS video URL to post instead of generating a new video'
        required: false
        type: string
      manual_video_title:
        description: 'Optional title for manual video posting'
        required: false
        type: string
      manual_video_caption:
        description: 'Optional caption/description for manual video posting'
        required: false
        type: string
      enabled_platforms:
        description: 'Platforms to post to, comma-separated'
        required: false
        default: 'youtube,facebook'
        type: string
  schedule:
    - cron: '0 13,18,23 * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Validate automation
        run: npm run validate:dry
        env:
          DRY_RUN_LOG_ONLY: true
          VIDEO_PROVIDER: openai_tts
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

  generate-and-post:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write

    env:
      USE_SECRET_MANAGER: ''
      DEFAULT_GOOGLE_CLOUD_PROJECT: natureswaysoil-video
      GOOGLE_CLOUD_PROJECT: natureswaysoil-video
      RUN_POSTING: 'true'
      ALLOW_DIRECT_SECRETS_FALLBACK: 'false'

      VIDEO_PROVIDER: openai_tts
      ENABLE_PLATFORMS: ${{ github.event.inputs.enabled_platforms || 'youtube,facebook' }}
      CI_MANDATORY_PLATFORMS: 'false'
      MANUAL_VIDEO_URL: ${{ github.event.inputs.manual_video_url }}
      MANUAL_VIDEO_TITLE: ${{ github.event.inputs.manual_video_title }}
      MANUAL_VIDEO_CAPTION: ${{ github.event.inputs.manual_video_caption }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}

      GCS_PUBLIC_BUCKET: natureswaysoil-social-videos
      VIDEO_PUBLIC_BUCKET: natureswaysoil-social-videos
      VIDEO_PUBLIC_URL_BASE: https://storage.googleapis.com/natureswaysoil-social-videos

      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        if: env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.DEFAULT_GOOGLE_CLOUD_PROJECT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Prepare Google ADC credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CLOUD_PROJECT_SECRET: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        run: |
          set -euo pipefail

          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -f "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
            {
              echo "GOOGLE_CLOUD_PROJECT=$DEFAULT_GOOGLE_CLOUD_PROJECT"
              echo "GCLOUD_PROJECT=$DEFAULT_GOOGLE_CLOUD_PROJECT"
              echo "GCP_PROJECT=$DEFAULT_GOOGLE_CLOUD_PROJECT"
              echo "USE_SECRET_MANAGER=true"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          CREDS_JSON="${GOOGLE_CREDENTIALS:-}"
          if [ -z "$CREDS_JSON" ]; then
            CREDS_JSON="${GOOGLE_SERVICE_ACCOUNT_JSON:-}"
          fi

          if [ -z "$CREDS_JSON" ]; then
            echo "::warning::No OIDC context or GOOGLE_CREDENTIALS/GOOGLE_SERVICE_ACCOUNT_JSON secret found."
            echo "USE_SECRET_MANAGER=false" >> "$GITHUB_ENV"
            exit 0
          fi

          CREDS_PATH="$RUNNER_TEMP/gcp-service-account.json"
          printf '%s' "$CREDS_JSON" > "$CREDS_PATH"
          chmod 600 "$CREDS_PATH"
          PROJECT_FROM_JSON="$(jq -r '.project_id // ""' "$CREDS_PATH" 2>/dev/null || true)"
          EFFECTIVE_PROJECT="${GOOGLE_CLOUD_PROJECT_SECRET:-$PROJECT_FROM_JSON}"
          if [ -z "$EFFECTIVE_PROJECT" ]; then
            EFFECTIVE_PROJECT="$DEFAULT_GOOGLE_CLOUD_PROJECT"
          fi
          {
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_PATH"
            echo "GOOGLE_CLOUD_PROJECT=$EFFECTIVE_PROJECT"
            echo "GCLOUD_PROJECT=$EFFECTIVE_PROJECT"
            echo "GCP_PROJECT=$EFFECTIVE_PROJECT"
            echo "USE_SECRET_MANAGER=true"
          } >> "$GITHUB_ENV"

      - name: Log auth context
        run: |
          set -euo pipefail
          mode="direct-github-secrets"
          if [ "${USE_SECRET_MANAGER:-false}" = "true" ]; then
            if [ -n "${GOOGLE_GHA_CREDS_PATH:-}" ]; then
              mode="google-oidc"
            elif [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
              mode="google-service-account-json"
            else
              mode="google-adc"
            fi
          fi

          echo "Auth mode: $mode"
          echo "Google project: ${GOOGLE_CLOUD_PROJECT:-unset}"
          {
            echo "### Social Video Scheduler Auth Context"
            echo
            echo "- Auth mode: $mode"
            echo "- Google project: ${GOOGLE_CLOUD_PROJECT:-unset}"
            echo "- Secret Manager enabled: ${USE_SECRET_MANAGER:-false}"
            echo "- Enabled platforms: ${ENABLE_PLATFORMS:-unset}"
            if [ -n "${MANUAL_VIDEO_URL:-}" ]; then
              echo "- Manual video URL supplied: yes"
            else
              echo "- Manual video URL supplied: no"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate direct GitHub secrets fallback
        if: env.USE_SECRET_MANAGER == 'false'
        run: |
          set -euo pipefail
          enabled_platforms="${ENABLE_PLATFORMS:-youtube,facebook}"
          enabled_platforms_lower="$(echo "$enabled_platforms" | tr '[:upper:]' '[:lower:]')"
          missing=()
          for name in OPENAI_API_KEY PEXELS_API_KEY; do
            if [ -z "${!name:-}" ] && [ -z "${MANUAL_VIDEO_URL:-}" ]; then
              missing+=("$name")
            fi
          done
          has_platform() {
            local platform="$1"
            [[ ",$enabled_platforms_lower," == *",$platform,"* ]]
          }
          has_any() {
            for key in "$@"; do
              if [ -n "${!key:-}" ]; then
                return 0
              fi
            done
            return 1
          }
          if has_platform youtube; then
            has_any YOUTUBE_CLIENT_ID || missing+=("YOUTUBE_CLIENT_ID")
            has_any YOUTUBE_CLIENT_SECRET || missing+=("YOUTUBE_CLIENT_SECRET")
            has_any YOUTUBE_REFRESH_TOKEN || missing+=("YOUTUBE_REFRESH_TOKEN")
          fi
          if has_platform facebook; then
            has_any FACEBOOK_PAGE_ACCESS_TOKEN FB_PAGE_ACCESS_TOKEN || missing+=("FACEBOOK_PAGE_ACCESS_TOKEN or FB_PAGE_ACCESS_TOKEN")
            has_any FACEBOOK_PAGE_ID FB_PAGE_ID || missing+=("FACEBOOK_PAGE_ID or FB_PAGE_ID")
          fi
          if has_platform instagram; then
            has_any INSTAGRAM_ACCESS_TOKEN || missing+=("INSTAGRAM_ACCESS_TOKEN")
            has_any INSTAGRAM_IG_ID INSTAGRAM_USER_ID INSTAGRAM_ACCOUNT_ID || missing+=("INSTAGRAM_IG_ID, INSTAGRAM_USER_ID, or INSTAGRAM_ACCOUNT_ID")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Direct GitHub secrets fallback is missing required secrets for enabled platforms: ${missing[*]}."
            exit 1
          fi
          echo "Direct GitHub repo secrets fallback validation passed for enabled platforms: $enabled_platforms_lower"

      - name: Enforce Google auth strategy
        run: |
          set -euo pipefail
          if [ "${USE_SECRET_MANAGER:-false}" = "true" ]; then
            exit 0
          fi
          if [ "${ALLOW_DIRECT_SECRETS_FALLBACK:-false}" = "true" ]; then
            echo "::warning::Using direct GitHub secrets fallback because ALLOW_DIRECT_SECRETS_FALLBACK=true."
            exit 0
          fi
          if [ "${RUN_POSTING:-true}" = "true" ]; then
            echo "::error::Social Video Scheduler real posting requires Google auth (OIDC or service-account JSON). Set ALLOW_DIRECT_SECRETS_FALLBACK=true only if you explicitly want non-standard fallback mode."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - run: npm install

      - name: Run manual video posting
        if: env.RUN_POSTING == 'true' && env.MANUAL_VIDEO_URL != ''
        run: npm run post:manual-video

      - name: Run scheduled automation
        if: env.RUN_POSTING == 'true' && env.MANUAL_VIDEO_URL == ''
        run: npm run post:scheduled
