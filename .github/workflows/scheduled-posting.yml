name: Scheduled Social Video Posting

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC.
    # Approx ET posting slots: 7:00 AM, 8:15 AM, 11:30 AM, 1:00 PM, 6:15 PM
    - cron: '0 11 * * *'
    - cron: '15 12 * * *'
    - cron: '30 15 * * *'
    - cron: '0 17 * * *'
    - cron: '15 22 * * *'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write

    env:
      # Opt JavaScript actions into the GitHub Node 24 runtime now so the
      # scheduled workflow does not keep warning about Node 20 action runtime deprecation.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      # Default mode: load app/API secrets from Google Secret Manager.
      # If no Google service-account secret is configured, the workflow falls
      # back to direct GitHub repo secrets and sets USE_SECRET_MANAGER=false.
      USE_SECRET_MANAGER: 'true'
      DEFAULT_GOOGLE_CLOUD_PROJECT: natureswaysoil-video
      GOOGLE_CLOUD_PROJECT: natureswaysoil-video

      SEED_PRODUCT_LIMIT: '5'
      VARIATIONS_PER_PRODUCT: '5'
      ENABLE_PLATFORMS: youtube,instagram
      YT_PRIVACY_STATUS: public
      DRY_RUN_LOG_ONLY: 'false'
      ROTATION_STATE_FILE: data/rotation-state.json
      HEYGEN_POLL_TIMEOUT_MS: '1500000'
      HEYGEN_POLL_INTERVAL_MS: '15000'
      RUN_POSTING: 'true'

      # Optional direct GitHub repo secrets fallback. These stay masked by GitHub.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
      HEYGEN_API_ENDPOINT: ${{ secrets.HEYGEN_API_ENDPOINT }}
      HEYGEN_DEFAULT_AVATAR: ${{ secrets.HEYGEN_DEFAULT_AVATAR }}
      HEYGEN_DEFAULT_VOICE: ${{ secrets.HEYGEN_DEFAULT_VOICE }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_IG_ID: ${{ secrets.INSTAGRAM_IG_ID }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore rotation state
        uses: actions/cache/restore@v4
        with:
          path: data/rotation-state.json
          key: rotation-state-${{ github.run_id }}
          restore-keys: |
            rotation-state-

      - name: Authenticate to Google Cloud (OIDC)
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Prepare Google ADC credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CLOUD_PROJECT_SECRET: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        run: |
          set -euo pipefail

          # If OIDC auth already provided ADC, keep it and skip JSON-key setup.
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -f "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
            echo "OIDC authentication already configured GOOGLE_APPLICATION_CREDENTIALS."
            echo "USE_SECRET_MANAGER=true" >> "$GITHUB_ENV"
            exit 0
          fi

          CREDS_JSON="${GOOGLE_CREDENTIALS:-}"
          if [ -z "$CREDS_JSON" ]; then
            CREDS_JSON="${GOOGLE_SERVICE_ACCOUNT_JSON:-}"
          fi

          if [ -z "$CREDS_JSON" ]; then
            echo "::warning::No GOOGLE_CREDENTIALS or GOOGLE_SERVICE_ACCOUNT_JSON repo secret found. Falling back to direct GitHub repo secrets."
            echo "USE_SECRET_MANAGER=false" >> "$GITHUB_ENV"
            exit 0
          fi

          CREDS_PATH="$RUNNER_TEMP/gcp-service-account.json"
          printf '%s' "$CREDS_JSON" > "$CREDS_PATH"
          chmod 600 "$CREDS_PATH"
          PROJECT_FROM_JSON="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("project_id", ""))' "$CREDS_PATH" || true)"
          EFFECTIVE_PROJECT="${GOOGLE_CLOUD_PROJECT_SECRET:-$PROJECT_FROM_JSON}"
          if [ -z "$EFFECTIVE_PROJECT" ]; then
            EFFECTIVE_PROJECT="$DEFAULT_GOOGLE_CLOUD_PROJECT"
          fi
          {
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_PATH"
            echo "GOOGLE_CLOUD_PROJECT=$EFFECTIVE_PROJECT"
            echo "GCLOUD_PROJECT=$EFFECTIVE_PROJECT"
            echo "GCP_PROJECT=$EFFECTIVE_PROJECT"
            echo "USE_SECRET_MANAGER=true"
          } >> "$GITHUB_ENV"
          echo "Using Google Cloud project: $EFFECTIVE_PROJECT"

      - name: Validate direct GitHub secrets fallback
        if: env.USE_SECRET_MANAGER == 'false'
        run: |
          set -euo pipefail
          missing=()
          for name in OPENAI_API_KEY HEYGEN_API_KEY PEXELS_API_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::warning::Skipping post run. No Google service-account secret was found, and these required direct GitHub repo secrets are missing: ${missing[*]}. Add GOOGLE_SERVICE_ACCOUNT_JSON/GOOGLE_CREDENTIALS, or add the direct API secrets."
            echo "RUN_POSTING=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "Using direct GitHub repo secrets fallback."

      - name: Skip run when posting is not configured
        if: env.RUN_POSTING == 'false'
        run: |
          echo "Posting credentials are not configured. Scheduled run is being skipped intentionally."

      - name: Setup Node
        if: env.RUN_POSTING == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: env.RUN_POSTING == 'true'
        run: npm install

      - name: Run scheduled video post
        if: env.RUN_POSTING == 'true'
        run: npm run post:scheduled

      - name: Save rotation state cache
        if: always() && env.RUN_POSTING == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/rotation-state.json
          key: rotation-state-${{ github.run_id }}

      - name: Upload rotation state artifact
        if: always() && env.RUN_POSTING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rotation-state
          path: data/rotation-state.json
          if-no-files-found: ignore
