name: Scheduled Social Video Posting

on:
  workflow_dispatch:
    inputs:
      run_posting:
        description: 'Run the posting pipeline (set false to skip all posting steps — config/auth check only)'
        required: false
        default: true
        type: boolean
      dry_run:
        description: 'Dry-run mode: render video and validate output WITHOUT publishing to social accounts'
        required: false
        default: false
        type: boolean
      target_account:
        description: 'Comma-separated platforms to target (e.g. youtube or youtube,instagram). Leave blank for all defaults.'
        required: false
        default: ''
        type: string
  # Scheduled triggers are intentionally DISABLED.
  # The Cloud Run Job `social-video-broll-job` on Cloud Scheduler is the single
  # authoritative scheduler. This workflow is kept for manual runs/tests via the
  # "Run workflow" button. Do not re-enable the schedule below unless you have
  # paused the Cloud Scheduler job, or you will get duplicate/competing posts.
  # schedule:
  #   - cron: '0 11 * * *'
  #   - cron: '15 12 * * *'
  #   - cron: '30 15 * * *'
  #   - cron: '0 17 * * *'
  #   - cron: '15 22 * * *'

# Prevent overlapping manual runs from racing on the shared rotation cursor.
concurrency:
  group: social-video-posting
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write

    env:
      # Opt JavaScript actions into the GitHub Node 24 runtime now so the
      # scheduled workflow does not keep warning about Node 20 action runtime deprecation.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      # Default mode: load app/API secrets from Google Secret Manager.
      # If no Google service-account secret is configured, the workflow falls
      # back to direct GitHub repo secrets and sets USE_SECRET_MANAGER=false.
      USE_SECRET_MANAGER: 'true'
      DEFAULT_GOOGLE_CLOUD_PROJECT: natureswaysoil-video
      GOOGLE_CLOUD_PROJECT: natureswaysoil-video

      SEED_PRODUCT_LIMIT: '20'
      VARIATIONS_PER_PRODUCT: '5'
      # Include facebook_groups so the scheduled run actually executes scripts/lib/facebook-groups.ts.
      ENABLE_PLATFORMS: youtube,instagram,facebook,facebook_groups
      # Production-friendly mode: let working platforms post even if one platform/token fails.
      CI_MANDATORY_PLATFORMS: 'false'
      YT_PRIVACY_STATUS: public
      DRY_RUN_LOG_ONLY: 'false'
      ROTATION_STATE_FILE: data/rotation-state.json
      # Dispatch input: inputs.run_posting defaults to true; only set to false via explicit dispatch.
      RUN_POSTING: ${{ inputs.run_posting == false && 'false' || 'true' }}
      # Dispatch input: dry_run=true renders the video but skips all social publishing API calls.
      POSTING_DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}

      # Public video hosting for Instagram/Facebook.
      # The automation uploads each rendered MP4 to:
      # gs://natureswaysoil-social-videos/social-videos/
      GCS_PUBLIC_BUCKET: natureswaysoil-social-videos
      VIDEO_PUBLIC_BUCKET: natureswaysoil-social-videos
      # Keep this at the bucket root. The script appends social-videos/<filename>.
      VIDEO_PUBLIC_URL_BASE: https://storage.googleapis.com/natureswaysoil-social-videos

      # Optional direct GitHub repo secrets fallback. These stay masked by GitHub.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_IG_ID: ${{ secrets.INSTAGRAM_IG_ID }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_GROUPS_ACCESS_TOKEN: ${{ secrets.FACEBOOK_GROUPS_ACCESS_TOKEN }}
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      TIKTOK_OPEN_ID: ${{ secrets.TIKTOK_OPEN_ID }}
      DID_API_KEY: ${{ secrets.DID_API_KEY }}
      DiD: ${{ secrets.DiD }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore rotation state
        uses: actions/cache/restore@v4
        with:
          path: data/rotation-state.json
          key: rotation-state-${{ github.run_id }}
          restore-keys: |
            rotation-state-

      - name: Authenticate to Google Cloud (OIDC)
        if: env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != ''
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.DEFAULT_GOOGLE_CLOUD_PROJECT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Prepare Google ADC credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CLOUD_PROJECT_SECRET: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
        run: |
          set -euo pipefail

          # If OIDC auth already provided ADC, keep it and skip JSON-key setup.
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -f "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
            echo "OIDC authentication already configured GOOGLE_APPLICATION_CREDENTIALS."
            {
              echo "GOOGLE_CLOUD_PROJECT=$DEFAULT_GOOGLE_CLOUD_PROJECT"
              echo "GCLOUD_PROJECT=$DEFAULT_GOOGLE_CLOUD_PROJECT"
              echo "GCP_PROJECT=$DEFAULT_GOOGLE_CLOUD_PROJECT"
              echo "USE_SECRET_MANAGER=true"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          CREDS_JSON="${GOOGLE_CREDENTIALS:-}"
          if [ -z "$CREDS_JSON" ]; then
            CREDS_JSON="${GOOGLE_SERVICE_ACCOUNT_JSON:-}"
          fi

          if [ -z "$CREDS_JSON" ]; then
            echo "::warning::No GOOGLE_CREDENTIALS or GOOGLE_SERVICE_ACCOUNT_JSON repo secret found. Falling back to direct GitHub repo secrets."
            echo "USE_SECRET_MANAGER=false" >> "$GITHUB_ENV"
            exit 0
          fi

          CREDS_PATH="$RUNNER_TEMP/gcp-service-account.json"
          printf '%s' "$CREDS_JSON" > "$CREDS_PATH"
          chmod 600 "$CREDS_PATH"
          PROJECT_FROM_JSON="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("project_id", ""))' "$CREDS_PATH" || true)"
          EFFECTIVE_PROJECT="${GOOGLE_CLOUD_PROJECT_SECRET:-$PROJECT_FROM_JSON}"
          if [ -z "$EFFECTIVE_PROJECT" ]; then
            EFFECTIVE_PROJECT="$DEFAULT_GOOGLE_CLOUD_PROJECT"
          fi
          {
            echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_PATH"
            echo "GOOGLE_CLOUD_PROJECT=$EFFECTIVE_PROJECT"
            echo "GCLOUD_PROJECT=$EFFECTIVE_PROJECT"
            echo "GCP_PROJECT=$EFFECTIVE_PROJECT"
            echo "USE_SECRET_MANAGER=true"
          } >> "$GITHUB_ENV"
          echo "Using Google Cloud project: $EFFECTIVE_PROJECT"

      - name: Log auth context
        run: |
          set -euo pipefail
          mode="direct-github-secrets"
          if [ "${USE_SECRET_MANAGER:-false}" = "true" ]; then
            if [ -n "${GOOGLE_GHA_CREDS_PATH:-}" ]; then
              mode="google-oidc"
            elif [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]; then
              mode="google-service-account-json"
            else
              mode="google-adc"
            fi
          fi

          echo "Auth mode: $mode"
          echo "Google project: ${GOOGLE_CLOUD_PROJECT:-unset}"
          {
            echo "### Scheduled Posting Auth Context"
            echo
            echo "- Auth mode: $mode"
            echo "- Google project: ${GOOGLE_CLOUD_PROJECT:-unset}"
            echo "- Secret Manager enabled: ${USE_SECRET_MANAGER:-false}"
            echo "- Public video bucket: ${GCS_PUBLIC_BUCKET:-unset}"
            echo "- Public video URL base: ${VIDEO_PUBLIC_URL_BASE:-unset}"
            echo "- Enabled platforms: ${ENABLE_PLATFORMS:-unset}"
            echo "- Mandatory platform mode: ${CI_MANDATORY_PLATFORMS:-unset}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Apply dispatch input overrides
        if: github.event_name == 'workflow_dispatch'
        env:
          TARGET_ACCOUNT_INPUT: ${{ inputs.target_account }}
        run: |
          set -euo pipefail
          # Override ENABLE_PLATFORMS when caller specified a target_account.
          if [ -n "${TARGET_ACCOUNT_INPUT:-}" ]; then
            echo "Overriding ENABLE_PLATFORMS to: $TARGET_ACCOUNT_INPUT"
            echo "ENABLE_PLATFORMS=$TARGET_ACCOUNT_INPUT" >> "$GITHUB_ENV"
          fi

          # Surface the dispatch run mode in the job summary.
          run_posting="${RUN_POSTING:-true}"
          posting_dry_run="${POSTING_DRY_RUN:-false}"
          {
            echo "### Manual Dispatch Run"
            echo
            if [ "$posting_dry_run" = "true" ]; then
              echo "- **Mode:** :test_tube: **Dry-run** — video will be rendered but NOT published to social accounts"
            elif [ "$run_posting" = "false" ]; then
              echo "- **Mode:** :no_entry: **Posting disabled** — posting steps skipped"
            else
              echo "- **Mode:** :rocket: **Live posting** — video will be rendered and published"
            fi
            echo "- run_posting: $run_posting"
            echo "- dry_run (POSTING_DRY_RUN): $posting_dry_run"
            echo "- target_account input: ${TARGET_ACCOUNT_INPUT:-(default)}"
            echo "- Effective ENABLE_PLATFORMS: ${ENABLE_PLATFORMS:-unset}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate direct GitHub secrets fallback
        if: env.USE_SECRET_MANAGER == 'false'
        run: |
          set -euo pipefail
          enabled_platforms="${ENABLE_PLATFORMS:-youtube,instagram,facebook}"
          enabled_platforms="$(echo "$enabled_platforms" | tr '[:upper:]' '[:lower:]')"
          missing=()
          for name in OPENAI_API_KEY PEXELS_API_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          has_platform() {
            local platform="$1"
            [[ ",$enabled_platforms," == *",$platform,"* ]]
          }
          has_any() {
            for key in "$@"; do
              if [ -n "${!key:-}" ]; then
                return 0
              fi
            done
            return 1
          }
          if has_platform youtube; then
            has_any YOUTUBE_CLIENT_ID YT_CLIENT_ID || missing+=("YOUTUBE_CLIENT_ID|YT_CLIENT_ID")
            has_any YOUTUBE_CLIENT_SECRET YT_CLIENT_SECRET || missing+=("YOUTUBE_CLIENT_SECRET|YT_CLIENT_SECRET")
            has_any YOUTUBE_REFRESH_TOKEN YT_REFRESH_TOKEN || missing+=("YOUTUBE_REFRESH_TOKEN|YT_REFRESH_TOKEN")
          fi
          if has_platform instagram; then
            has_any INSTAGRAM_ACCESS_TOKEN || missing+=("INSTAGRAM_ACCESS_TOKEN")
            has_any INSTAGRAM_IG_ID INSTAGRAM_USER_ID INSTAGRAM_ACCOUNT_ID || missing+=("INSTAGRAM_IG_ID|INSTAGRAM_USER_ID|INSTAGRAM_ACCOUNT_ID")
          fi
          if has_platform facebook; then
            has_any FACEBOOK_PAGE_ACCESS_TOKEN FB_PAGE_ACCESS_TOKEN || missing+=("FACEBOOK_PAGE_ACCESS_TOKEN|FB_PAGE_ACCESS_TOKEN")
            has_any FACEBOOK_PAGE_ID FB_PAGE_ID || missing+=("FACEBOOK_PAGE_ID|FB_PAGE_ID")
          fi
          if has_platform tiktok; then
            has_any TIKTOK_ACCESS_TOKEN || missing+=("TIKTOK_ACCESS_TOKEN")
            has_any TIKTOK_OPEN_ID || missing+=("TIKTOK_OPEN_ID")
          fi
          if has_platform facebook_groups; then
            has_any FACEBOOK_GROUPS_ACCESS_TOKEN || missing+=("FACEBOOK_GROUPS_ACCESS_TOKEN")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Direct GitHub secrets fallback is missing required secrets for enabled platforms: ${missing[*]}."
            exit 1
          fi
          echo "Using direct GitHub repo secrets fallback for all enabled platforms: $enabled_platforms"

      - name: Skip run when posting is not configured
        if: env.RUN_POSTING == 'false'
        run: |
          echo "Posting credentials are not configured. Scheduled run is being skipped intentionally."

      - name: Setup Node
        if: env.RUN_POSTING == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ensure FFmpeg is available
        if: env.RUN_POSTING == 'true'
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version

      - name: Install dependencies
        if: env.RUN_POSTING == 'true'
        run: npm install

      - name: Run scheduled video post
        id: scheduled_post
        if: env.RUN_POSTING == 'true'
        continue-on-error: true
        run: npm run post:scheduled

      - name: Fallback YouTube-only post if full social run fails
        if: env.RUN_POSTING == 'true' && env.POSTING_DRY_RUN != 'true' && steps.scheduled_post.outcome == 'failure'
        env:
          ENABLE_PLATFORMS: youtube
          CI_MANDATORY_PLATFORMS: 'false'
          ROTATION_STATE_PERSIST_TO_GCS: 'false'
        run: |
          echo "::warning::Full multi-platform post failed. Retrying YouTube-only so the scheduled post still publishes when public URL/GCS/social API posting is the blocker."
          npm run post:scheduled

      - name: Optional analytics backfill (after 24h)
        if: env.RUN_POSTING == 'true' && env.POSTING_DRY_RUN != 'true' && env.RUN_ANALYTICS_BACKFILL == 'true'
        run: npm run fetch:analytics

      - name: Upload dry-run artifacts
        if: env.RUN_POSTING == 'true' && env.POSTING_DRY_RUN == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-output-${{ github.run_id }}
          path: |
            output/
            temp-scheduled/
          if-no-files-found: ignore

      - name: Save rotation state cache
        if: always() && env.RUN_POSTING == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/rotation-state.json
          key: rotation-state-${{ github.run_id }}

      - name: Upload rotation state artifact
        if: always() && env.RUN_POSTING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rotation-state
          path: data/rotation-state.json
          if-no-files-found: ignore
